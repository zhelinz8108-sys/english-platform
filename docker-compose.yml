name: english-platform

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: english_platform
      POSTGRES_USER: english_owner
      POSTGRES_PASSWORD: english_owner
    ports:
      - '55432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U english_owner -d english_platform']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'noeviction']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/english-platform-private;
      mc anonymous set none local/english-platform-private;
      exit 0;
      "

  migrate:
    image: english-platform-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ['node', 'packages/database/dist/cli/migrate.js']
    environment:
      NODE_ENV: development
      DATABASE_ADMIN_URL: postgresql://english_owner:english_owner@postgres:5432/english_platform
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  seed:
    image: english-platform-api:local
    profiles: ['demo']
    command: ['node', 'packages/database/dist/cli/seed.js']
    environment:
      NODE_ENV: development
      DATABASE_ADMIN_URL: postgresql://english_owner:english_owner@postgres:5432/english_platform
      DEMO_PASSWORD: ${DEMO_PASSWORD:-Demo123!}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: 'no'

  api:
    image: english-platform-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 4000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      API_ORIGIN: http://localhost:4000
      DATABASE_ADMIN_URL: postgresql://english_owner:english_owner@postgres:5432/english_platform
      DATABASE_URL: postgresql://english_app:english_app@postgres:5432/english_platform
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-20}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-15000}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-compose-secret-change-before-deploying}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      COOKIE_SECURE: 'false'
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: english-platform-private
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: 'true'
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-english-platform-api}
    ports:
      - '4000:4000'
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  worker:
    image: english-platform-worker:local
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: development
      WORKER_DATABASE_URL: postgresql://english_worker:english_worker@postgres:5432/english_platform
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    image: english-platform-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_ORIGIN: http://api:4000
        NEXT_PUBLIC_API_ORIGIN: ''
        NEXT_PUBLIC_DEMO_MODE: 'false'
    environment:
      NODE_ENV: production
      API_ORIGIN: http://api:4000
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data:

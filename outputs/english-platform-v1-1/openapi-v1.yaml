openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: 个性化英语学习平台 API
  version: 1.1.0
  summary: General 与 TOEFL 核心学习闭环的官方 Web API 契约
  description: |
    本契约是 V1.1 服务端与官方 Web 端之间的唯一接口真相源。

    所有租户资源均位于 `/api/v1/tenants/{tenantId}/...`。服务端必须先验证当前
    用户的有效租户成员关系，再在数据库事务内设置租户、用户和成员上下文，由
    PostgreSQL RLS 执行第二道隔离。调用者无权知道目标资源是否存在时统一返回
    `404`；资源本身对调用者可见、但当前操作不被允许时才返回 `403`。

    日期时间字段必须是 UTC RFC 3339（以 `Z` 结尾），标识符均为 UUID。列表使用
    不透明游标分页。错误响应使用 RFC 7807 `application/problem+json`。

    官方 Web 端使用 HttpOnly Access Cookie。所有有状态写请求还必须携带
    `X-CSRF-Token`，其值与可读 CSRF Cookie 组成双提交校验。标记了
    `Idempotency-Key` 的命令在相同主体、租户、路由和请求体下重试时必须返回首次
    结果；同键不同请求体返回 `409`。自动保存使用 `If-Match` 与响应 `ETag`，并以
    `revision` 提供可观测的乐观并发版本。
  contact:
    name: English Platform Engineering
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
    description: Same-origin official Web application
tags:
  - name: Authentication
    description: CSRF bootstrap, login, refresh, and session lifecycle
  - name: Current User
    description: Current identity and accessible tenants
  - name: Student Profile
    description: Tenant-scoped student profile and exam goals
  - name: Student Dashboard
    description: Student summary and next actions
  - name: Student Tasks
    description: Materialized student task items, attempts, autosave, and submission
  - name: Student Paths
    description: General and TOEFL learning-path enrollments
  - name: Student Progress
    description: Basic progress aggregates
  - name: Student Feedback
    description: Returned grades and teacher feedback
  - name: Teacher Dashboard
    description: Teacher workload and class summary
  - name: Teacher Students
    description: Relationship-scoped student views
  - name: Teacher Classes
    description: Multi-teacher classes and rosters
  - name: Teacher Assignments
    description: Task assignment drafts and publication
  - name: Teacher Assessment
    description: Overrides, grading, and returned work
  - name: Admin Memberships
    description: Tenant memberships and roles
  - name: Admin Content
    description: Stable content entities and immutable versions
  - name: Admin Questions
    description: Stable question entities and immutable versions
  - name: Admin Tasks
    description: Stable task definitions and immutable versions
  - name: Admin Paths
    description: Stable learning paths and immutable versions
  - name: Admin Audit
    description: Immutable tenant audit events
  - name: Files
    description: Direct-to-object-storage upload lifecycle
security:
  - accessCookie: []
paths:
  /api/v1/auth/csrf:
    get:
      tags: [Authentication]
      summary: Bootstrap CSRF protection
      operationId: getCsrfToken
      security: []
      responses:
        '200':
          description: CSRF token returned and mirrored in a SameSite CSRF cookie
          headers:
            Set-Cookie:
              description: Non-HttpOnly CSRF cookie; never contains an authentication secret
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfTokenResponse'
              example:
                token: 2f75eac8-62e5-49fb-bcc3-4f260141c6aa
                expiresAt: '2026-07-10T13:00:00Z'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Sign in to the official Web application
      description: Origin and Fetch Metadata validation are required in addition to the CSRF token.
      operationId: login
      security:
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: learner@example.cn
              password: correct-horse-battery-staple
      responses:
        '200':
          description: Authenticated; rotating Access and Refresh cookies are set
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AuthSetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/refresh:
    post:
      tags: [Authentication]
      summary: Rotate the session cookies
      description: Refresh-token reuse revokes the entire token family and returns 401.
      operationId: refreshSession
      security:
        - refreshCookie: []
          csrfHeader: []
      responses:
        '200':
          description: Session rotated
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AuthSetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/session:
    delete:
      tags: [Authentication]
      summary: Sign out and revoke the active refresh-token family
      operationId: logout
      security:
        - accessCookie: []
          csrfHeader: []
      responses:
        '204':
          description: Session revoked; authentication cookies are expired
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AuthSetCookie'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
  /api/v1/me:
    get:
      tags: [Current User]
      summary: Get the current global user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/me/tenants:
    get:
      tags: [Current User]
      summary: List active tenant memberships
      operationId: listMyTenants
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Tenants the current user may enter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMembershipPage'
              example:
                data:
                  - membershipId: 41ec3ace-bff1-4dc2-a997-61d9611febd3
                    tenant:
                      id: d61f2d08-a85e-4bbc-b860-dfdcbec68dc9
                      name: 上海示范英语中心
                      slug: sh-demo
                    roles: [student]
                    status: active
                page:
                  nextCursor: null
                  hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/tenants/{tenantId}/student/profile:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      tags: [Student Profile]
      summary: Get the current student's tenant profile
      operationId: getStudentProfile
      responses:
        '200':
          description: Student profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Student Profile]
      summary: Update editable student profile fields and exam goals
      operationId: updateStudentProfile
      security:
        - accessCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentProfileRequest'
      responses:
        '200':
          description: Updated student profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfile'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/tenants/{tenantId}/student/dashboard:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      tags: [Student Dashboard]
      summary: Get the current student's dashboard
      operationId: getStudentDashboard
      responses:
        '200':
          description: Dashboard aggregates and next task items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDashboard'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/student/task-items:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      tags: [Student Tasks]
      summary: List materialized task items for the current student
      operationId: listStudentTaskItems
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: resolutionState
          in: query
          schema:
            $ref: '#/components/schemas/ResolutionState'
        - name: workflowState
          in: query
          schema:
            $ref: '#/components/schemas/WorkflowState'
        - name: availability
          in: query
          schema:
            $ref: '#/components/schemas/Availability'
        - name: dueBefore
          in: query
          schema:
            $ref: '#/components/schemas/UtcDateTime'
      responses:
        '200':
          description: Stable ordering is dueAt ascending, createdAt ascending, id ascending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentTaskItemPage'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/student/task-items/{taskItemId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/TaskItemId'
    get:
      tags: [Student Tasks]
      summary: Get a task item with frozen task and question versions
      operationId: getStudentTaskItem
      responses:
        '200':
          description: Task item detail; answer keys are never included.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentTaskItemDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/student/task-items/{taskItemId}/attempts:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/TaskItemId'
    post:
      tags: [Student Tasks]
      summary: Start the first attempt or an explicit student retry
      description: Return never creates a new attempt. intent=retry increments attemptNumber and is rejected when another attempt is open or maxAttempts is exhausted.
      operationId: createTaskAttempt
      security:
        - accessCookie: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttemptRequest'
            example:
              intent: start
              clientStartedAt: '2026-07-10T12:00:00Z'
      responses:
        '201':
          description: Attempt created; ETag identifies initial draft revision 1.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAttempt'
              example:
                id: ae12ba7d-04af-4fd9-b715-23e3a8f98921
                tenantId: d61f2d08-a85e-4bbc-b860-dfdcbec68dc9
                taskItemId: 71dcf7ae-ad69-43f6-bf2b-0fb1cb9966aa
                attemptNumber: 1
                state: in_progress
                revision: 1
                submissionRevision: 0
                latestSubmissionSnapshotId: null
                snapshotHash: 3d17133c75012af8a62d9db9f13064685efc9e5697f1c63fb8358117b2fd63bb
                startedAt: '2026-07-10T12:00:01Z'
                submittedAt: null
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/tenants/{tenantId}/student/attempts/{attemptId}/draft:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/AttemptId'
    patch:
      tags: [Student Tasks]
      summary: Autosave an attempt draft with optimistic concurrency
      description: Saving a returned attempt reopens the same attempt for editing; it does not increment attemptNumber.
      operationId: saveAttemptDraft
      security:
        - accessCookie: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveDraftRequest'
            example:
              baseRevision: 3
              answers:
                - questionVersionId: a99d69be-72e8-4440-931a-21cb34d1b479
                  value: B
                - questionVersionId: e1204d52-a8dd-44f3-bd5d-c408b633e1b2
                  value: My response draft.
      responses:
        '200':
          description: Draft saved; clients must use the new ETag on the next save.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftSaveResult'
              example:
                attemptId: ae12ba7d-04af-4fd9-b715-23e3a8f98921
                revision: 4
                savedAt: '2026-07-10T12:08:00Z'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
  /api/v1/tenants/{tenantId}/student/attempts/{attemptId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/AttemptId'
    get:
      tags: [Student Tasks]
      summary: Reload the current attempt draft and revision
      operationId: getTaskAttempt
      responses:
        '200':
          description: Current mutable draft or immutable submitted snapshot
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAttemptDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/student/attempts/{attemptId}/submit:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/AttemptId'
    post:
      tags: [Student Tasks]
      summary: Submit an immutable answer snapshot
      description: The first successful command for a submission revision wins. A returned attempt may be edited and submitted again; this appends the next immutable SubmissionSnapshot revision on the same attempt. An exact idempotent retry returns the original receipt.
      operationId: submitAttempt
      security:
        - accessCookie: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAttemptRequest'
            example:
              baseRevision: 4
              clientSubmittedAt: '2026-07-10T12:10:00Z'
      responses:
        '200':
          description: Attempt submitted or original response replayed
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionReceipt'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
  /api/v1/tenants/{tenantId}/student/learning-paths:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      tags: [Student Paths]
      summary: List active and historical learning-path enrollments
      operationId: listStudentLearningPaths
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: track
          in: query
          schema:
            $ref: '#/components/schemas/LearningTrack'
      responses:
        '200':
          description: Learning-path enrollments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPathEnrollmentPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/student/learning-paths/{enrollmentId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/EnrollmentId'
    get:
      tags: [Student Paths]
      summary: Get a path enrollment and its resolved milestones
      operationId: getStudentLearningPath
      responses:
        '200':
          description: Path enrollment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPathEnrollmentDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/student/progress:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      tags: [Student Progress]
      summary: Get basic progress aggregates
      operationId: getStudentProgress
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Progress summary; no advanced analytics are exposed in V1.1.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProgress'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/student/feedback:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      tags: [Student Feedback]
      summary: List published grades and teacher feedback
      operationId: listStudentFeedback
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Feedback visible to the current student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/teacher/dashboard:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      tags: [Teacher Dashboard]
      summary: Get teacher workload and class summary
      operationId: getTeacherDashboard
      responses:
        '200':
          description: Dashboard restricted to related classes and students
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherDashboard'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/teacher/students:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      tags: [Teacher Students]
      summary: List students related through a class or direct teacher link
      operationId: listTeacherStudents
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: classId
          in: query
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: query
          in: query
          description: Prefix search over display name or tenant-local student number
          schema:
            type: string
            minLength: 1
            maxLength: 100
      responses:
        '200':
          description: Relationship-scoped students
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherStudentPage'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/teacher/students/{studentMembershipId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/StudentMembershipId'
    get:
      tags: [Teacher Students]
      summary: Get a related student's basic profile and progress
      operationId: getTeacherStudent
      responses:
        '200':
          description: Student overview; private fields outside the teaching purpose are omitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherStudentDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{tenantId}/teacher/students/{studentMembershipId}/learning-path-enrollments:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/StudentMembershipId'
    post:
      tags: [Teacher Students]
      summary: Enroll a related student in a published General or TOEFL path version
      operationId: createLearningPathEnrollment
      security:
        - accessCookie: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLearningPathEnrollmentRequest'
      responses:
        '201':
          description: Enrollment created; path task materialization is queued via Outbox.
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPathEnrollment'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/tenants/{tenantId}/teacher/students/{studentMembershipId}/learning-path-enrollments/{enrollmentId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/StudentMembershipId'
      - $ref: '#/components/parameters/EnrollmentId'
    patch:
      tags: [Teacher Students]
      summary: Pause, resume, complete, or cancel a related student's path enrollment
      operationId: updateLearningPathEnrollment
      description: Pausing or cancelling inactivates only unstarted path sources; task, attempt, submission, and grade history remain.
      security:
        - accessCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLearningPathEnrollmentRequest'
      responses:
        '200':

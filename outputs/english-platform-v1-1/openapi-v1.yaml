components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: Short-lived, HttpOnly, Secure, SameSite=Lax signed access cookie.
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Rotating, HttpOnly, Secure, SameSite=Strict opaque refresh cookie; only its hash is stored.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Double-submit token that must match the readable csrf_token cookie on every state-changing request.
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      description: Tenant UUID from the current user's active membership list.
      schema:
        $ref: '#/components/schemas/Uuid'
    TaskItemId:
      name: taskItemId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    AttemptId:
      name: attemptId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    EnrollmentId:
      name: enrollmentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    StudentMembershipId:
      name: studentMembershipId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    TeacherMembershipId:
      name: teacherMembershipId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    ClassId:
      name: classId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    MembershipId:
      name: membershipId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    ContentId:
      name: contentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    QuestionId:
      name: questionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    PathId:
      name: pathId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor returned as page.nextCursor; clients must not parse or construct it.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    PageSize:
      name: pageSize
      in: query
      description: Requested page size.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-generated key retained for at least 24 hours. Scope is user, tenant, method,
        and canonical route. Reusing a key with an identical body replays the original status,
        headers, and body; reusing it with a different body returns 409.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[A-Za-z0-9._:-]+$'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Strong ETag received from attempt creation or the latest draft save.
      schema:
        type: string
        pattern: '^"[A-Za-z0-9._:-]+"$'
        example: '"attempt-ae12ba7d-r4"'
  headers:
    AuthSetCookie:
      description: One or more Set-Cookie values for access_token and refresh_token rotation or expiry.
      schema:
        type: string
    ETag:
      description: Strong validator for the returned attempt revision.
      schema:
        type: string
        example: '"attempt-ae12ba7d-r4"'
    IdempotencyReplayed:
      description: true when this response replays a previously completed idempotent command.
      schema:
        type: boolean
        default: false
  responses:
    ValidationProblem:
      description: Request validation failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://api.example.cn/problems/validation-error
            title: 请求参数无效
            status: 400
            detail: 一个或多个字段未通过校验。
            instance: /api/v1/tenants/d61f2d08-a85e-4bbc-b860-dfdcbec68dc9/student/progress
            requestId: 0198a371-8261-7e53-9905-c81722fc08db
            errors:
              - field: to
                code: date_range_invalid
                message: to 必须不早于 from。
    Unauthorized:
      description: Authentication is absent, expired, revoked, or refresh-token reuse was detected.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    CsrfForbidden:
      description: CSRF, Origin, or Fetch Metadata validation failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: The resource is visible to the caller, but the caller's role or relationship forbids this operation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Resource not found, tenant membership inactive, relationship absent, or existence intentionally concealed to prevent enumeration.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://api.example.cn/problems/not-found
            title: 未找到资源
            status: 404
            detail: 请求的资源不存在或不可访问。
            requestId: 0198a371-8261-7e53-9905-c81722fc08db
    Conflict:
      description: State transition, idempotency-key reuse, duplicate relation, or logical concurrent update conflict.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            idempotencyMismatch:
              value:
                type: https://api.example.cn/problems/idempotency-key-reused
                title: 幂等键已用于不同请求
                status: 409
                detail: 请为不同的请求体生成新的 Idempotency-Key。
                requestId: 0198a371-8261-7e53-9905-c81722fc08db
            idempotencyInProgress:
              value:
                type: https://api.example.cn/problems/idempotency-in-progress
                title: 相同命令仍在处理中
                status: 409
                detail: 请使用相同 Idempotency-Key 稍后重试。
                requestId: 0198a371-8261-7e53-9905-c81722fc08db
            stateConflict:
              value:
                type: https://api.example.cn/problems/state-conflict
                title: 当前状态不允许该操作
                status: 409
                detail: 此作答已由另一请求提交。
                requestId: 0198a371-8261-7e53-9905-c81722fc08db
    PreconditionFailed:
      description: If-Match does not equal the current strong ETag; reload the latest draft before merging.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://api.example.cn/problems/etag-mismatch
            title: 草稿版本已变化
            status: 412
            detail: If-Match 与当前草稿版本不一致。
            requestId: 0198a371-8261-7e53-9905-c81722fc08db
            currentEtag: '"attempt-ae12ba7d-r5"'
            currentRevision: 5
    PreconditionRequired:
      description: Required If-Match header is missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    PayloadTooLarge:
      description: Declared or observed upload size exceeds the configured limit.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          description: Seconds until another request should be attempted.
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    Uuid:
      type: string
      format: uuid
      description: Server-generated UUIDv7; clients treat it as an opaque UUID on the wire.
      example: 0198a352-01be-75a6-8e96-8ce78921799a
    UtcDateTime:
      type: string
      format: date-time
      pattern: '^(?:[0-9]{4})-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12][0-9]|3[01])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](?:\.[0-9]+)?Z$'
      description: UTC RFC 3339 timestamp serialized from PostgreSQL timestamptz; offsets other than Z are rejected.
      example: '2026-07-10T12:00:00Z'
    ContentHash:
      type: string
      pattern: '^[a-f0-9]{64}$'
      description: Lowercase SHA-256 digest of the canonical immutable snapshot.
    PageInfo:
      type: object
      additionalProperties: false
      required: [nextCursor, hasMore]
      properties:
        nextCursor:
          type: [string, 'null']
          maxLength: 512
        hasMore:
          type: boolean
    ProblemFieldError:
      type: object
      additionalProperties: false
      required: [field, code, message]
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
    ProblemDetails:
      type: object
      description: RFC 7807 problem detail with stable platform extensions.
      required: [type, title, status, requestId]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        requestId:
          $ref: '#/components/schemas/Uuid'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ProblemFieldError'
      additionalProperties: true
    CsrfTokenResponse:
      type: object
      additionalProperties: false
      required: [token, expiresAt]
      properties:
        token:
          type: string
          minLength: 32
          maxLength: 256
        expiresAt:
          $ref: '#/components/schemas/UtcDateTime'
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
    PlatformRole:
      type: string
      enum: [none, super_admin]
    CurrentUser:
      type: object
      additionalProperties: false
      required: [id, email, displayName, platformRole, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        platformRole:
          $ref: '#/components/schemas/PlatformRole'
        createdAt:
          $ref: '#/components/schemas/UtcDateTime'
    SessionResponse:
      type: object
      additionalProperties: false
      required: [user, accessExpiresAt, refreshExpiresAt]
      properties:
        user:
          $ref: '#/components/schemas/CurrentUser'
        accessExpiresAt:
          $ref: '#/components/schemas/UtcDateTime'
        refreshExpiresAt:
          $ref: '#/components/schemas/UtcDateTime'
    TenantRole:
      type: string
      enum: [owner, admin, teacher, student, content_editor, analyst]
    MembershipStatus:
      type: string
      enum: [invited, active, suspended, left]
    TenantSummary:
      type: object
      additionalProperties: false
      required: [id, name, slug]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{1,62}[a-z0-9]$'
    TenantMembershipSummary:
      type: object
      additionalProperties: false
      required: [membershipId, tenant, roles, status]
      properties:
        membershipId:
          $ref: '#/components/schemas/Uuid'
        tenant:
          $ref: '#/components/schemas/TenantSummary'
        roles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/TenantRole'
        status:
          $ref: '#/components/schemas/MembershipStatus'
    TenantMembershipPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TenantMembershipSummary'
        page:
          $ref: '#/components/schemas/PageInfo'
    ExamKind:
      type: string
      enum: [toefl]
      description: V1.1 supports TOEFL; additional exams require a contract version update.
    ExamGoalStatus:
      type: string
      enum: [active, achieved, cancelled]
    StudentExamGoal:
      type: object
      additionalProperties: false
      required: [id, exam, targetScore, targetDate, status]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        exam:
          $ref: '#/components/schemas/ExamKind'
        targetScore:
          type: number
          minimum: 0
          maximum: 120
        targetDate:
          type: [string, 'null']
          format: date
        status:
          $ref: '#/components/schemas/ExamGoalStatus'
    ExamGoalInput:
      type: object
      additionalProperties: false
      required: [exam, targetScore]
      properties:
        id:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
          description: Existing goal ID when updating; null or omitted creates a goal.
        exam:
          $ref: '#/components/schemas/ExamKind'
        targetScore:
          type: number
          minimum: 0
          maximum: 120
        targetDate:
          type: [string, 'null']
          format: date
        status:
          $ref: '#/components/schemas/ExamGoalStatus'
    StudentProfile:
      type: object
      additionalProperties: false
      required: [membershipId, userId, displayName, studentNumber, locale, timezone, examGoals, createdAt, updatedAt]
      properties:
        membershipId:
          $ref: '#/components/schemas/Uuid'
        userId:
          $ref: '#/components/schemas/Uuid'
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        studentNumber:
          type: [string, 'null']
          maxLength: 64
        locale:
          type: string
          enum: [zh-CN, en-US]
        timezone:
          type: string
          example: Asia/Shanghai
        examGoals:
          type: array
          items:
            $ref: '#/components/schemas/StudentExamGoal'
        createdAt:
          $ref: '#/components/schemas/UtcDateTime'
        updatedAt:
          $ref: '#/components/schemas/UtcDateTime'
    UpdateStudentProfileRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        locale:
          type: string
          enum: [zh-CN, en-US]
        timezone:
          type: string
          minLength: 1
          maxLength: 64
        examGoals:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/ExamGoalInput'
    ResolutionState:
      type: string
      enum: [active, hidden, superseded]
      description: Effective `student_task_items.resolution_state` after applying append-only overrides.
    ResolutionReason:
      type: string
      enum: [winner, override_hidden, source_inactive, slot_conflict, replaced]
      description: Deterministic reason for the effective resolution state.
    WorkflowState:
      type: string
      enum: [not_started, in_progress, submitted, grading, returned, completed, cancelled]
      description: Student task workflow state; availability and lateness are modeled separately.
    Availability:
      type: string
      enum: [locked, upcoming, available]
      description: Derived from prerequisites and availability windows; not persisted as workflow state.
    TaskKind:
      type: string
      enum: [lesson, practice, assessment, writing]
    TaskSourceType:
      type: string
      enum: [admin_forced, individual, class, exam_path, general]
      description: Precedence is admin_forced 500, individual 400, class 300, exam_path 200, general 100; ties use explicitPriority, publishedAt, then ID descending.
    StudentTaskSource:
      type: object
      additionalProperties: false
      required: [id, sourceType, sourceRefId, occurrenceKey, slotKey, precedenceScore, explicitPriority, publishedAt, active]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        sourceType:
          $ref: '#/components/schemas/TaskSourceType'
        sourceRefId:
          $ref: '#/components/schemas/Uuid'
        occurrenceKey:
          type: string
          minLength: 1
          maxLength: 180
        slotKey:
          type: string
          minLength: 1
          maxLength: 180
        precedenceScore:
          type: integer
          enum: [100, 200, 300, 400, 500]
        explicitPriority:
          type: integer
          minimum: 0
          maximum: 99
        publishedAt:
          $ref: '#/components/schemas/UtcDateTime'
        active:
          type: boolean
    StudentTaskItem:
      type: object
      additionalProperties: false
      required:
        - id
        - tenantId
        - studentMembershipId
        - taskVersionId
        - occurrenceKey
        - slotKey
        - title
        - kind
        - resolutionState
        - resolutionReason
        - workflowState
        - availability
        - availableAt
        - dueAt
        - closeAt
        - isOverdue
        - isLate
        - sourceCount
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        tenantId:
          $ref: '#/components/schemas/Uuid'
        studentMembershipId:
          $ref: '#/components/schemas/Uuid'
        taskVersionId:
          $ref: '#/components/schemas/Uuid'
        occurrenceKey:
          type: string
          minLength: 1
          maxLength: 180
        slotKey:
          type: string
          minLength: 1
          maxLength: 180
        title:
          type: string
          minLength: 1
          maxLength: 200
        kind:
          $ref: '#/components/schemas/TaskKind'
        resolutionState:
          $ref: '#/components/schemas/ResolutionState'
        resolutionReason:
          $ref: '#/components/schemas/ResolutionReason'
        workflowState:
          $ref: '#/components/schemas/WorkflowState'
        availability:
          $ref: '#/components/schemas/Availability'
        availableAt:
          oneOf:
            - $ref: '#/components/schemas/UtcDateTime'
            - type: 'null'
        dueAt:
          oneOf:
            - $ref: '#/components/schemas/UtcDateTime'
            - type: 'null'
        closeAt:
          oneOf:
            - $ref: '#/components/schemas/UtcDateTime'
            - type: 'null'
        isOverdue:
          type: boolean
          description: Derived true when an unfinished available item is past due.
        isLate:
          type: boolean
          description: Derived true when the immutable submission timestamp is later than its effective dueAt.
        sourceCount:
          type: integer
          minimum: 1
        createdAt:
          $ref: '#/components/schemas/UtcDateTime'
    StudentTaskItemPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StudentTaskItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    QuestionOption:
      type: object
      additionalProperties: false
      required: [id, label, content]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 64
        label:
          type: string
          minLength: 1
          maxLength: 16
        content:
          type: string
          minLength: 1
    StructuredDocument:
      type: object
      description: Versioned structured rich-text JSON; HTML and executable content are forbidden.
      additionalProperties: true
    QuestionForStudent:
      type: object
      additionalProperties: false
      description: Frozen question projection; correct answers and private scoring rules are excluded.
      required: [questionVersionId, kind, prompt, options, position]
      properties:
        questionVersionId:
          $ref: '#/components/schemas/Uuid'
        kind:
          $ref: '#/components/schemas/QuestionKind'
        prompt:
          $ref: '#/components/schemas/StructuredDocument'
        options:
          type: array
          description: Frozen randomized option order for this attempt.
          items:
            $ref: '#/components/schemas/QuestionOption'
        position:
          type: integer
          minimum: 1
        maxScore:
          type: number
          minimum: 0
    TaskVersionForStudent:
      type: object
      additionalProperties: false
      required: [id, versionNumber, title, instructions, kind, contentHash, questions]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        versionNumber:
          type: integer
          minimum: 1
        title:
          type: string
        instructions:
          $ref: '#/components/schemas/StructuredDocument'
        kind:
          $ref: '#/components/schemas/TaskKind'
        contentHash:
          $ref: '#/components/schemas/ContentHash'
        questions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QuestionForStudent'
    StudentTaskItemDetail:
      type: object
      additionalProperties: false
      required: [item, taskSnapshot, sources, currentAttempt]
      properties:
        item:
          $ref: '#/components/schemas/StudentTaskItem'
        taskSnapshot:
          $ref: '#/components/schemas/TaskVersionForStudent'
        sources:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/StudentTaskSource'
        currentAttempt:
          oneOf:
            - $ref: '#/components/schemas/TaskAttempt'
            - type: 'null'
    AttemptState:
      type: string
      enum: [in_progress, submitted, grading, returned, completed, cancelled]
      description: Draft data lives in attempt_drafts; autosaving a returned attempt transitions it back to in_progress.
    TaskAttempt:
      type: object
      additionalProperties: false
      required: [id, tenantId, taskItemId, attemptNumber, state, revision, submissionRevision, latestSubmissionSnapshotId, snapshotHash, startedAt, submittedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
